<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M7 Informática e Variedades</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="h-box-logo">
        <img
          src="./assets/logo/logoM7.jpg"
          alt="Logo da empresa M7 Informática e Variedades"
          class="h-logo"
        />
      </div>

      <nav class="h-nav flex">
        <ul class="h-nav-menu">
            
        </ul>

        <div class="h-btn-menu">
          <span class="h-menu-line1">s</span>
          <span class="h-menu-line2">s</span>
          <span class="h-menu-line3">s</span>
        </div>
      </nav>
      <section class="h-banner">
        <h1 class="h-banner-title">M7 Informática e Variedades</h1>
      </section>
    </header>

    <section class="showcase container">
        <div class="sh-box flex">
            <article class="sh-card">
                <div class="sh-sub-card">
                    <figure class="sh-card-box-img flex">
                        <img src="./assets/img/Copo termico 473ml.png" alt="" class="sh-card-img">
                    </figure>
                    <div class="sh-card-content">

                        <h4 class="sh-card-title">Copo Térmico 473ML</h4>

                        <div class="sh-card-content-bnts">
                            <span class="sh-card-price">20,00</span>
                            <a href="#" class="sh-card-btns-parcelado">Parcelar</a>
                            <a href="#" class="sh-card-btns-pix">Pix 5%</a>
                        </div>
                        
                    </div>

                </div>

                <div class="sh-sub-card-back-content">
                    <div class="sh-card-sub-back-content">
                        <p class="sh-card-text-content">Cor Preto</p>
                        <p class="sh-card-text-content">Isolado a vácuo</p>
                        <p class="sh-card-text-content">Aço inoxidável</p>
                        <p class="sh-card-text-content">Tampa e Abridor de garrafa</p>
                    </div>
                </div>
            </article>

            
        </div>
    </section>
  </body>
</html>
